,0.2),transparent_24%)]"></div><section class="relative z-10 flex flex-col bg-[#1f1013] py-9 sm:m-5 sm:mr-0 sm:rounded-[30px] sm:py-10"><div class="my-auto max-w-xl"><p class="mb-[15px] inline-flex rounded-[20px] bg-white px-[15px] py-[5px] text-sm font-semibold text-[#e54d42]">DEADSHOT.io desktop client</p><div class="flex items-center gap-4"><img src="assets/favicon.png" alt="KO Client logo" class="size-14 rounded-[14px] object-cover outline outline-1 -outline-offset-1 outline-white/10 shadow-[0_0_32px_rgba(255,48,38,0.38)]"><h1 class="text-balance text-5xl font-bold leading-[0.9] tracking-[-0.06em] sm:text-7xl">KO Client.</h1></div><p class="mt-5 max-w-[300px] text-pretty text-sm leading-relaxed text-white/90 sm:max-w-md sm:text-base">Lightweight DEADSHOT.io client with stable FPS, low CPU/RAM usage, exclusive KO skins, skin unlock, UI mods, and ad/tracker blocking.</p><div class="mt-6 h-auto w-full"><div class="relative h-64 overflow-hidden rounded-[25px] bg-[#2b161b]"><img src="assets/preview/preview-1.png" alt="KO Client main screen preview" class="preview-slide absolute inset-0 h-full w-full object-cover opacity-100 transition-[opacity,scale] duration-300 ease-out"> <img src="assets/preview/preview-2.png" alt="KO Client skin locker preview" class="preview-slide absolute inset-0 h-full w-full object-cover opacity-0 transition-[opacity,scale] duration-300 ease-out"> <img src="assets/preview/preview-3.png" alt="KO Client custom UI preview" class="preview-slide absolute inset-0 h-full w-full object-cover opacity-0 transition-[opacity,scale] duration-300 ease-out"> <img src="assets/preview/preview-4.png" alt="KO Client custom scope preview" class="preview-slide absolute inset-0 h-full w-full object-cover opacity-0 transition-[opacity,scale] duration-300 ease-out"> <img src="assets/preview/preview-5.png" alt="KO Client SMG holo smaller preview" class="preview-slide absolute inset-0 h-full w-full object-cover opacity-0 transition-[opacity,scale] duration-300 ease-ou background-image:url(assets/bg/rarity.png)" data-model="assets/guns/awp.glb" data-skin="assets/compressed/koawp0.webp" data-label="KO / AWP" aria-label="Select KO AWP" aria-pressed="true"><img src="assets/compressed/koawp.webp" alt="KO AWP" class="h-[78px] w-full object-contain transition-[rotate,scale] duration-150 ease-out group-hover:rotate-[-7deg] group-hover:scale-110"><span class="text-[11px] font-black uppercase leading-none text-white">KO</span><span class="text-[9px] font-black leading-none text-[#63ff3f]">Flawless</span></button><button type="button" class="weapon-icon group grid h-[104px] w-[118px] place-items-center overflow-hidden rounded-[6px] bg-[#1f1013] bg-cover bg-center px-1.5 pb-1 pt-1.5 text-center shadow-[0_0_0_1px_rgba(255,255,255,0.08)] transition-[scale,box-shadow] duration-150 ease-out active:scale-[0.96]" style="background-image:url(assets/bg/rarity.png)" data-model="assets/guns/shotgun.glb" data-skin="assets/compressed/koshotgun0.webp" data-label="KO / Shotgun" aria-label="Select KO Shotgun" aria-pressed="false"><img src="assets/compressed/koshotgun.webp" alt="KO Shotgun" class="h-[78px] w-full object-contain transition-[rotate,scale] duration-150 ease-out group-hover:rotate-[-7deg] group-hover:scale-110"><span class="text-[11px] font-black uppercase leading-none text-white">KO</span><span class="text-[9px] font-black leading-none text-[#63ff3f]">Flawless</span></button><button type="button" class="weapon-icon group grid h-[104px] w-[118px] place-items-center overflow-hidden rounded-[6px] bg-[#1f1013] bg-cover bg-center px-1.5 pb-1 pt-1.5 text-center shadow-[0_0_0_1px_rgba(255,255,255,0.08)] transition-[scale,box-shadow] duration-150 ease-out active:scale-[0.96]" style="background-image:url(assets/bg/rarity.png)" data-model="assets/guns/vector.glb" data-skin="assets/compressed/kosmg0.webp" data-label="KO / Vector" aria-label="Select KO Vector" aria-pressed="false"><img src="assets/compressed/kosmg.webp" alt="KO Vector" class="h-[78px] w-full object-contain transition-[rotate,scale] duration-150 ease-out group-hover:rotate-[-7deg] group-hover:scale-110"><span class="text-[11px] font-black uppercase leading-none text-white">KO</span><span class="text-[9px] font-black leading-none text-[#63ff3f]">Flawless</span></button></div></section></main><dialog id="discord-dialog" class="z-[9999] m-auto w-[min(92vw,44rem)] overflow-hidden border-0 bg-transparent p-0 text-white backdrop:bg-black/85"><div class="relative overflow-hidden rounded-[40px] bg-[#2b161b] p-5 shadow-2xl"><button id="close-discord" type="button" class="absolute right-8 top-8 z-20 inline-flex min-h-11 min-w-11 items-center justify-center rounded-full bg-[#3b1e25] px-4 text-xs font-bold uppercase tracking-wider text-white shadow-[0_0_0_1px_rgba(255,255,255,0.08)] transition-[scale,background-color] duration-150 ease-out hover:bg-[#4a2a30] active:scale-[0.96]" aria-label="Close Discord">Close</button><div id="discord-content" class="min-h-[22rem]"><p class="p-5 text-sm text-[#aaa]">Loading guild status...</p></div></div></dialog><script>const initTilt = () => {
				document.querySelectorAll('a, button').forEach((element) => element.classList.add('js-tilt'));
				if (window.jQuery?.fn?.tilt) {
					$('.js-tilt').tilt({ scale: 1.2 });
				}
			};
			initTilt();
			const previewTitles = [
				'Main Screen',
				'Skin Unlock / KO Locker',
				'Custom UI',
				'Custom Scope',
				'SMG Holo Smaller',
				'SMG Holo Smaller II',
			];
			const previewSlides = [...document.querySelectorAll('.preview-slide')];
			const previewDots = [...document.querySelectorAll('.preview-dot')];
			const previewTitle = document.querySelector('#preview-title');
			let previewIndex = 0;
			const showPreview = (index) => {
				previewIndex = (index + previewSlides.length) % previewSlides.length;
				previewSlides.forEach((slide, slideIndex) => {
					slide.classList.toggle('opacity-100', slideIndex === previewIndex);
					slide.classList.toggle('opacity-0', slideIndex !== previewIndex);
					slide.classList.toggle('scale-[1.02]', slideIndex === previewIndex);
				});
				previewDots.forEach((dot, dotIndex) => {
					dot.className = dotIndex === previewIndex
						? 'preview-dot h-1.5 w-5 rounded-full bg-white transition-[background-color,width] duration-150 ease-out'
						: 'preview-dot h-1.5 w-1.5 rounded-full bg-white/35 transition-[background-color,width] duration-150 ease-out';
				});
				previewTitle.textContent = previewTitles[previewIndex];
			};
			document.querySelector('#preview-prev').addEventListener('click', () => showPreview(previewIndex - 1));
			document.querySelector('#preview-next').addEventListener('click', () => showPreview(previewIndex + 1));
			previewDots.forEach((dot, index) => dot.addEventListener('click', () => showPreview(index)));
			const weaponModel = document.querySelector('#weapon-model');
			const applyTexture = async (viewer, textureUrl) => {
				const texture = await viewer.createTexture(textureUrl, 'image/webp');
				viewer.model.materials.forEach((material) =>
					material.pbrMetallicRoughness.baseColorTexture.setTexture(texture),
				);
			};
			weaponModel.addEventListener('load', () => applyTexture(weaponModel, 'assets/compressed/koawp0.webp'), { once: true });
			document.querySelectorAll('.weapon-icon').forEach((button) => {
				button.addEventListener('click', () => {
					const { model, skin } = button.dataset;
					weaponModel.addEventListener('load', () => applyTexture(weaponModel, skin), { once: true });
					weaponModel.setAttribute('src', model);
					document.querySelectorAll('.weapon-icon').forEach((item) => {
						item.className = 'weapon-icon group grid h-[104px] w-[118px] place-items-center overflow-hidden rounded-[6px] bg-[#1f1013] bg-cover bg-center px-1.5 pb-1 pt-1.5 text-center shadow-[0_0_0_1px_rgba(255,255,255,0.08)] transition-[scale,box-shadow] duration-150 ease-out active:scale-[0.96]';
						item.setAttribute('aria-pressed', 'false');
					});
					button.className = 'weapon-icon group grid h-[104px] w-[118px] place-items-center overflow-hidden rounded-[6px] bg-[#1f1013] bg-cover bg-center px-1.5 pb-1 pt-1.5 text-center shadow-[0_0_0_2px_rgba(255,71,87,0.9),0_0_22px_rgba(255,71,87,0.25)] transition-[scale,box-shadow] duration-150 ease-out active:scale-[0.96]';
					button.setAttribute('aria-pressed', 'true');
				});
			});
			const discordDialog = document.querySelector('#discord-dialog');
			const discordContent = document.querySelector('#discord-content');
			let discordLoaded = false;
			const renderDiscord = (guild) => {
				const visibleMembers = guild.members.slice(0, 6);
				const hiddenMembers = Math.max(guild.members.length - visibleMembers.length, 0);
				const banner = document.createElement('section');
				banner.className = 'relative min-h-[300px] overflow-hidden rounded-[30px] bg-gradient-to-r from-[#e54d42] to-[#b83b45] p-[30px]';
				banner.innerHTML = `<div class="relative z-10 flex h-full max-w-[23rem] flex-col justify-between gap-10"><div><span class="inline-flex rounded-[20px] bg-white px-[15px] py-[5px] text-sm font-semibold text-[#e54d42]">${guild.name} community</span><h2 class="mt-5 text-balance text-5xl font-bold tracking-[-0.06em] text-white">Join the squad.</h2><p class="mt-3 max-w-[19rem] text-pretty text-sm leading-relaxed text-white/90"><span class="tabular-nums font-bold text-white">${guild.presence_count}</span> players are online. Drop into voice rooms, get updates, and play DEADSHOT.io with KO.</p></div><a href="${guild.instant_invite}" target="_blank" rel="noreferrer" class="inline-flex w-max items-center justify-center rounded-[15px] bg-white px-[15px] py-2 text-sm font-semibold text-black transition-[scale,background-color] duration-150 ease-out hover:bg-gray-100 active:scale-[0.96]">Join now</a></div><img src="https://cdn.simpleicons.org/discord/ffffff" alt="" class="pointer-events-none absolute -right-8 bottom-0 z-0 h-[112%] w-auto opacity-20 [mask-image:linear-gradient(to_left,black_68%,transparent)]" />`;
				const channels = document.createElement('div');
				channels.className = 'mt-5';
				channels.innerHTML = '<p class="mb-3 text-lg font-semibold text-white">Voice rooms</p>';
				const channelList = document.createElement('div');
				channelList.className = 'flex flex-wrap gap-2.5';
				guild.channels.sort((a, b) => a.position - b.position).forEach((channel) => {
					const link = document.createElement('a');
					link.href = `https://discord.com/channels/${guild.id}/${channel.id}`;
					link.target = '_blank';
					link.rel = 'noreferrer';
					link.className = 'rounded-full bg-[#1f1013] px-4 py-2 text-sm font-medium text-white/80 transition-[scale,background-color,color] duration-150 ease-out hover:bg-[#3b1e25] hover:text-white active:scale-[0.96]';
					link.textContent = channel.name;
					channelList.append(link);
				});
				channels.append(channelList);
				const members = document.createElement('div');
				members.className = 'mt-5 flex items-center justify-between gap-5 rounded-[25px] bg-[#1f1013] p-2.5 pl-5 transition-[background-color] duration-150 ease-out hover:bg-[#3b1e25]';
				members.innerHTML = '<div><p class="text-sm font-medium text-white">In server now</p><p class="mt-0.5 text-xs text-white/50">Live Discord presence</p></div>';
				const memberStack = document.createElement('div');
				memberStack.className = 'flex -space-x-2 pr-1';
				visibleMembers.forEach((member) => {
					const avatar = document.createElement('img');
					avatar.src = member.avatar_url;
					avatar.alt = member.username;
					avatar.className = 'size-10 rounded-full object-cover outline outline-1 -outline-offset-1 outline-white/10 shadow-[0_0_0_3px_rgba(31,16,19,1)]';
					memberStack.append(avatar);
				});
				if (hiddenMembers > 0) {
					const more = document.createElement('span');
					more.className = 'grid size-10 place-items-center rounded-full bg-[#ff4757] text-xs font-bold text-white shadow-[0_0_0_3px_rgba(31,16,19,1)]';
					more.textContent = `+${hiddenMembers}`;
					memberStack.append(more);
				}
				members.append(memberStack);
				discordContent.replaceChildren(banner, channels, members);
				initTilt();
			};
			const loadDiscord = async () => {
				try {
					const response = await fetch('https://discord.com/api/guilds/1517961081480413244/widget.json');
					if (!response.ok) throw new Error('Discord widget unavailable');
					renderDiscord(await response.json());
					discordLoaded = true;
				} catch {
					discordContent.innerHTML = '<section class="rounded-[30px] bg-gradient-to-r from-[#e54d42] to-[#b83b45] p-[30px]"><span class="inline-flex rounded-[20px] bg-white px-[15px] py-[5px] text-sm font-semibold text-[#e54d42]">KO community</span><h2 class="mt-5 text-5xl font-bold tracking-[-0.06em] text-white">Join the squad.</h2><a href="https://discord.com/invite/97d7w5nX" target="_blank" rel="noreferrer" class="mt-10 inline-flex rounded-[15px] bg-white px-[15px] py-2 text-sm font-semibold text-black transition-[scale,background-color] duration-150 ease-out hover:bg-gray-100 active:scale-[0.96]">Join now</a></section>';
					initTilt();
				}
			};
			document.querySelector('#open-discord').addEventListener('click', () => {
				discordDialog.showModal();
				if (!discordLoaded) loadDiscord();
			});
			document.querySelector('#close-discord').addEventListener('click', () => discordDialog.close());</script></body></html>
