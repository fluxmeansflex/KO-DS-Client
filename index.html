<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta
      name="description"
      content="KO Client is a lightweight desktop client for DEADSHOT.io."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="./assets/favicon.ico" />
    <title>KO Client | DEADSHOT.io</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script
      type="module"
      src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.3.1/model-viewer.min.js"
    ></script>
  </head>
  <body
    class="min-h-svh overflow-hidden bg-[#160a0d] font-[Manrope] text-white antialiased selection:bg-[#ff4757] selection:text-white"
  >
    <main
      id="armory"
      class="relative isolate hidden min-h-svh overflow-hidden bg-[#241014] transition-[background-color] duration-[650ms] sm:block"
      style="--weapon-glow: rgba(255, 71, 87, 0.28)"
    >
      <img
        src="assets/bg/bg.webp"
        alt=""
        class="pointer-events-none absolute inset-0 -z-20 h-full w-full object-cover opacity-35 mix-blend-screen"
      />
      <img
        src="assets/bg/bg1.webp"
        alt=""
        class="pointer-events-none absolute inset-0 -z-20 h-full w-full object-cover opacity-35 mix-blend-screen"
      />
      <div
        class="pointer-events-none absolute inset-0 -z-10 bg-[radial-gradient(circle_at_50%_48%,var(--weapon-glow),transparent_31%)] transition-[background] duration-[650ms]"
      ></div>
      <div
        aria-hidden="true"
        class="pointer-events-none absolute inset-0 z-50 opacity-[0.14] [background-image:url(\"data:image/svg+xml,%3Csvg_viewBox='0_0_180_180'_xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter_id='n'%3E%3CfeTurbulence_type='fractalNoise'_baseFrequency='.9'_numOctaves='4'/%3E%3C/filter%3E%3Crect_width='100%25'_height='100%25'_filter='url(%23n)'_opacity='.4'/%3E%3C/svg%3E\")] [background-size:180px_180px]"
      ></div>

      <header class="absolute left-6 right-6 top-6 z-50 flex items-start justify-between sm:left-10 sm:right-10 sm:top-9">
        <a href="/" class="flex items-center gap-3" aria-label="KO Client home">
          <img src="assets/favicon.png" alt="" class="size-10 rounded-xl" />
          <span class="text-sm font-extrabold uppercase tracking-[0.22em]">KO Client</span>
        </a>
        <p class="text-right text-[10px] font-bold uppercase tracking-[0.22em] text-white/60">
          Deadshot.io / Skin locker
        </p>
      </header>

      <p
        aria-hidden="true"
        class="pointer-events-none absolute left-1/2 top-[13%] z-0 -translate-x-1/2 select-none whitespace-nowrap font-[Anton] text-[clamp(9rem,24vw,25rem)] leading-none tracking-[-0.045em] text-white/[0.08]"
      >
        KO SKINS
      </p>

      <section class="absolute inset-0 z-10 overflow-hidden" aria-label="KO Client previews">
        <div id="feature-preview-carousel" class="absolute left-1/2 top-1/2 aspect-[1266/713] w-[68vw] -translate-x-1/2 -translate-y-1/2 overflow-hidden rounded-[28px] bg-[#1f1013] shadow-[0_28px_70px_rgba(0,0,0,0.5)]">
          <video id="feature-preview-video" class="preview-slide absolute inset-0 size-full object-contain opacity-100 transition-[opacity,scale] duration-300 ease-out" src="assets/preview/preview-0.mp4" poster="assets/preview/preview-1.png" playsinline preload="metadata" aria-label="KO Client video preview"></video>
          <img data-src="assets/preview/preview-1.png" alt="KO Client main screen preview" class="preview-slide absolute inset-0 size-full object-contain opacity-0 transition-[opacity,scale] duration-300 ease-out" />
          <img data-src="assets/preview/preview-2.png" alt="KO Client skin locker preview" class="preview-slide absolute inset-0 size-full object-contain opacity-0 transition-[opacity,scale] duration-300 ease-out" />
          <img data-src="assets/preview/preview-3.png" alt="KO Client custom UI preview" class="preview-slide absolute inset-0 size-full object-contain opacity-0 transition-[opacity,scale] duration-300 ease-out" />
          <img data-src="assets/preview/preview-4.png" alt="KO Client custom scope preview" class="preview-slide absolute inset-0 size-full object-contain opacity-0 transition-[opacity,scale] duration-300 ease-out" />
          <img data-src="assets/preview/preview-5.png" alt="KO Client SMG holo smaller preview" class="preview-slide absolute inset-0 size-full object-contain opacity-0 transition-[opacity,scale] duration-300 ease-out" />
          <img data-src="assets/preview/preview-6.png" alt="KO Client SMG holo smaller second preview" class="preview-slide absolute inset-0 size-full object-contain opacity-0 transition-[opacity,scale] duration-300 ease-out" />
          <div class="pointer-events-none absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-black/20"></div>
          <p id="feature-preview-title" class="absolute left-5 top-5 text-sm font-semibold text-white drop-shadow-[0_2px_8px_rgba(0,0,0,0.75)]">KO Client Showcase</p>
          <div class="absolute right-5 top-5 z-20 flex gap-2" aria-label="Preview carousel controls">
            <button id="feature-preview-sound" type="button" class="rounded-full bg-black/45 px-3 py-2 text-[10px] font-bold uppercase tracking-wider text-white transition-colors hover:bg-black/65" aria-label="Play video with sound">Play video</button>
            <button id="feature-preview-prev" type="button" class="grid size-9 place-items-center rounded-full bg-[#3b1e25] text-lg font-bold text-white transition-[transform,background-color] duration-150 hover:scale-105 hover:bg-[#4a2a30]" aria-label="Previous preview">‹</button>
            <button id="feature-preview-next" type="button" class="grid size-9 place-items-center rounded-full bg-[#ff4757] text-lg font-bold text-white transition-[transform,background-color] duration-150 hover:scale-105 hover:bg-[#ff6b76]" aria-label="Next preview">›</button>
          </div>
          <div class="absolute bottom-5 left-5 flex gap-2" aria-label="Preview slides">
            <button type="button" class="preview-dot h-1.5 w-6 rounded-full bg-white transition-[background-color,width] duration-150" aria-label="Show video preview"></button>
            <button type="button" class="preview-dot h-1.5 w-6 rounded-full bg-white transition-[background-color,width] duration-150" aria-label="Show main screen preview"></button>
            <button type="button" class="preview-dot h-1.5 w-1.5 rounded-full bg-white/35 transition-[background-color,width] duration-150" aria-label="Show skin locker preview"></button>
            <button type="button" class="preview-dot h-1.5 w-1.5 rounded-full bg-white/35 transition-[background-color,width] duration-150" aria-label="Show custom UI preview"></button>
            <button type="button" class="preview-dot h-1.5 w-1.5 rounded-full bg-white/35 transition-[background-color,width] duration-150" aria-label="Show custom scope preview"></button>
            <button type="button" class="preview-dot h-1.5 w-1.5 rounded-full bg-white/35 transition-[background-color,width] duration-150" aria-label="Show SMG holo smaller preview"></button>
            <button type="button" class="preview-dot h-1.5 w-1.5 rounded-full bg-white/35 transition-[background-color,width] duration-150" aria-label="Show second SMG holo smaller preview"></button>
          </div>
        </div>
      </section>

      <section class="absolute right-6 top-1/2 z-40 flex -translate-y-1/2 flex-col items-center gap-2.5 sm:right-10" aria-label="KO weapon skin previews">
        <p class="mb-1 text-[10px] font-bold uppercase tracking-[0.2em] text-white/65">Skins</p>
        <button type="button" class="skin-card grid size-[88px] place-items-center rounded-lg bg-[url('assets/bg/rarity.png')] bg-cover bg-center p-1.5 shadow-[0_0_0_1px_rgba(255,255,255,0.12)] transition-[transform,box-shadow] duration-150 hover:scale-105 hover:shadow-[0_0_0_2px_rgba(255,71,87,0.9)]" data-model="assets/guns/ar2.glb" data-skin="assets/compressed/koar0.webp" data-title="KO AR-2 Skin">
          <img src="assets/compressed/koar.webp" alt="KO AR-2 skin preview" class="h-full w-full object-contain" />
        </button>
        <button type="button" class="skin-card grid size-[88px] place-items-center rounded-lg bg-[url('assets/bg/rarity.png')] bg-cover bg-center p-1.5 shadow-[0_0_0_1px_rgba(255,255,255,0.12)] transition-[transform,box-shadow] duration-150 hover:scale-105 hover:shadow-[0_0_0_2px_rgba(255,71,87,0.9)]" data-model="assets/guns/awp.glb" data-skin="assets/compressed/koawp0.webp" data-title="KO AWP Skin">
          <img src="assets/compressed/koawp.webp" alt="KO AWP skin preview" class="h-full w-full object-contain" />
        </button>
        <button type="button" class="skin-card grid size-[88px] place-items-center rounded-lg bg-[url('assets/bg/rarity.png')] bg-cover bg-center p-1.5 shadow-[0_0_0_1px_rgba(255,255,255,0.12)] transition-[transform,box-shadow] duration-150 hover:scale-105 hover:shadow-[0_0_0_2px_rgba(255,71,87,0.9)]" data-model="assets/guns/shotgun.glb" data-skin="assets/compressed/koshotgun0.webp" data-title="KO Shotgun Skin">
          <img src="assets/compressed/koshotgun.webp" alt="KO Shotgun skin preview" class="h-full w-full object-contain" />
        </button>
        <button type="button" class="skin-card grid size-[88px] place-items-center rounded-lg bg-[url('assets/bg/rarity.png')] bg-cover bg-center p-1.5 shadow-[0_0_0_1px_rgba(255,255,255,0.12)] transition-[transform,box-shadow] duration-150 hover:scale-105 hover:shadow-[0_0_0_2px_rgba(255,71,87,0.9)]" data-model="assets/guns/vector.glb" data-skin="assets/compressed/kosmg0.webp" data-title="KO Vector Skin">
          <img src="assets/compressed/kosmg.webp" alt="KO Vector skin preview" class="h-full w-full object-contain" />
        </button>
      </section>

      <section class="absolute bottom-8 left-6 z-50 max-w-sm sm:bottom-12 sm:left-10" aria-label="KO Client details">
        <p class="font-[Anton] text-4xl uppercase tracking-[-0.025em] sm:text-6xl">KO Client</p>
        <p class="mt-2 text-sm leading-relaxed text-white/75">
          Lightweight DEADSHOT.io desktop client with exclusive KO skins, UI mods, and ad blocking.
        </p>
      </section>

      <nav class="absolute bottom-8 right-6 z-50 flex items-center gap-3 sm:bottom-12 sm:right-10" aria-label="KO Client links">
        <a href="https://github.com/fluxmeansflex/KO-DS-Client/releases/download/v0.0.3/KO-DS-Setup.exe" target="_blank" rel="noreferrer" class="inline-flex min-h-11 items-center justify-center gap-3 rounded-full bg-[#ff4757] px-5 py-3 text-sm font-semibold transition-[transform,background-color] duration-150 hover:scale-105 hover:bg-[#ff6b76]">Download <span>→</span></a>
        <button id="open-discord" type="button" class="inline-flex min-h-11 items-center justify-center gap-3 rounded-full bg-[#3b1e25] px-5 py-3 text-sm font-semibold transition-[transform,background-color] duration-150 hover:scale-105 hover:bg-[#4a2a30]"><img src="https://cdn.simpleicons.org/discord" alt="" class="size-4" />Discord</button>
        <a href="https://github.com/fluxmeansflex/KO-DS-Client/" target="_blank" rel="noreferrer" class="grid size-11 place-items-center rounded-full bg-white text-black transition-transform duration-150 hover:scale-105" aria-label="Open KO Client GitHub repository"><img src="https://cdn.simpleicons.org/github" alt="" class="size-5" /></a>
      </nav>
    </main>

    <dialog id="discord-dialog" class="m-auto w-[min(92vw,44rem)] overflow-hidden border-0 bg-transparent p-0 text-white backdrop:bg-black/85">
      <div class="relative overflow-hidden rounded-[32px] bg-[#241014] p-5 shadow-2xl sm:p-7">
        <button id="close-discord" type="button" class="absolute right-8 top-8 z-20 inline-flex min-h-11 min-w-11 items-center justify-center rounded-full bg-[#3b1e25] px-4 text-xs font-bold uppercase tracking-wider text-white shadow-[0_0_0_1px_rgba(255,255,255,0.08)] transition-[transform,background-color] duration-150 hover:scale-105 hover:bg-[#4a2a30]" aria-label="Close Discord">Close</button>
        <div id="discord-content" class="min-h-[22rem]">
          <p class="p-5 text-sm text-white/60">Loading guild status...</p>
        </div>
      </div>
    </dialog>

    <dialog id="preview-dialog" class="m-auto w-[min(94vw,76rem)] overflow-hidden border-0 bg-transparent p-0 text-white backdrop:bg-black/85">
      <section class="relative overflow-hidden rounded-[32px] bg-[#241014] shadow-2xl">
        <img src="assets/bg/bg.webp" alt="" class="pointer-events-none absolute inset-0 size-full object-cover opacity-50 mix-blend-screen" />
        <img src="assets/bg/bg1.webp" alt="" class="pointer-events-none absolute inset-0 size-full object-cover opacity-40 mix-blend-screen" />
        <div class="pointer-events-none absolute inset-0 bg-[radial-gradient(circle_at_50%_50%,rgba(255,71,87,0.22),transparent_48%)]"></div>
        <button id="close-preview" type="button" class="absolute right-8 top-8 z-20 inline-flex min-h-11 min-w-11 items-center justify-center rounded-full bg-[#3b1e25] px-4 text-xs font-bold uppercase tracking-wider text-white shadow-[0_0_0_1px_rgba(255,255,255,0.08)] transition-[transform,background-color] duration-150 hover:scale-105 hover:bg-[#4a2a30]" aria-label="Close preview">Close</button>
        <div class="absolute left-8 top-8 z-20 drop-shadow-[0_2px_8px_rgba(0,0,0,0.8)]">
          <p class="text-[10px] font-bold uppercase tracking-[0.24em] text-white/70">KO Client preview</p>
          <h2 id="preview-modal-title" class="mt-2 font-[Anton] text-5xl uppercase tracking-[-0.03em]">Main Screen</h2>
        </div>
        <model-viewer id="preview-model" alt="KO skin model preview" camera-controls disable-pan touch-action="pan-y" shadow-intensity="1.2" shadow-softness="0.7" environment-image="neutral" exposure="1.1" camera-orbit="0.9062987206567279rad 2.1403422319889422rad 3.784688139146512m" field-of-view="11deg" min-field-of-view="1deg" max-field-of-view="120deg" zoom-sensitivity="1.5" interaction-prompt="auto" class="relative z-10 h-[min(82svh,52rem)] w-full cursor-grab active:cursor-grabbing [--progress-bar-color:#ff493d]" style="background-color: transparent"></model-viewer>
      </section>
    </dialog>

    <div class="grid min-h-svh place-items-center px-6 text-center text-3xl font-black uppercase tracking-[-0.05em] text-white sm:hidden">
      Windows support only
    </div>

    <script>
      const previewDialog = document.querySelector('#preview-dialog');
      const previewModel = document.querySelector('#preview-model');
      const previewModalTitle = document.querySelector('#preview-modal-title');
      const skinCards = [...document.querySelectorAll('.skin-card')];
      const applyTexture = async (viewer, textureUrl) => {
        const texture = await viewer.createTexture(textureUrl, 'image/webp');
        viewer.model.materials.forEach((material) => {
          material.pbrMetallicRoughness.baseColorTexture.setTexture(texture);
        });
      };
      const warmSkinModal = (card) => {
        const texture = new Image();
        texture.src = card.dataset.skin;
        fetch(card.dataset.model).catch(() => {});
      };
        skinCards.forEach((card) => {
          card.addEventListener('click', () => {
            pauseFeaturePreview();
            previewModalTitle.textContent = card.dataset.title;
          previewModel.addEventListener('load', () => applyTexture(previewModel, card.dataset.skin), { once: true });
          previewModel.setAttribute('src', card.dataset.model);
          previewDialog.showModal();
        });
        card.addEventListener('pointerenter', () => warmSkinModal(card), { once: true });
        card.addEventListener('focus', () => warmSkinModal(card), { once: true });
      });
      document.querySelector('#close-preview').addEventListener('click', () => previewDialog.close());

      const featurePreviewTitles = ['KO Client Showcase', 'Main Screen', 'Skin Unlock / KO Locker', 'Custom UI', 'Custom Scope', 'SMG Holo Smaller', 'SMG Holo Smaller II'];
      const featurePreviewSlides = [...document.querySelectorAll('.preview-slide')];
      const featurePreviewDots = [...document.querySelectorAll('.preview-dot')];
      const featurePreviewTitle = document.querySelector('#feature-preview-title');
      const featurePreviewCarousel = document.querySelector('#feature-preview-carousel');
      const featurePreviewVideo = document.querySelector('#feature-preview-video');
      const featurePreviewSound = document.querySelector('#feature-preview-sound');
        let featurePreviewIndex = 0;
        let featurePreviewTimer;
        let userStartedVideo = false;
        const pauseFeaturePreview = () => {
          window.clearInterval(featurePreviewTimer);
          featurePreviewVideo.pause();
        };
      const showFeaturePreview = (index) => {
        featurePreviewIndex = (index + featurePreviewSlides.length) % featurePreviewSlides.length;
        if (featurePreviewIndex === 0) {
          window.clearInterval(featurePreviewTimer);
          featurePreviewVideo.currentTime = 0;
          featurePreviewVideo.play().catch(() => {});
        } else {
          featurePreviewVideo.pause();
        }
        const currentSlide = featurePreviewSlides[featurePreviewIndex];
        if (!currentSlide.src) currentSlide.src = currentSlide.dataset.src;
        const nextSlide = featurePreviewSlides[(featurePreviewIndex + 1) % featurePreviewSlides.length];
        if (nextSlide.dataset.src) {
          const nextImage = new Image();
          nextImage.src = nextSlide.dataset.src;
        }
        featurePreviewSlides.forEach((slide, slideIndex) => {
          slide.classList.toggle('opacity-100', slideIndex === featurePreviewIndex);
          slide.classList.toggle('opacity-0', slideIndex !== featurePreviewIndex);
          slide.classList.toggle('scale-[1.02]', slideIndex === featurePreviewIndex);
        });
        featurePreviewDots.forEach((dot, dotIndex) => {
          dot.className = dotIndex === featurePreviewIndex
            ? 'preview-dot h-1.5 w-6 rounded-full bg-white transition-[background-color,width] duration-150'
            : 'preview-dot h-1.5 w-1.5 rounded-full bg-white/35 transition-[background-color,width] duration-150';
        });
        featurePreviewTitle.textContent = featurePreviewTitles[featurePreviewIndex];
      };
      const navigateFeaturePreview = (index) => {
        showFeaturePreview(index);
        if (featurePreviewIndex !== 0) startFeaturePreviewAutoplay();
      };
      document.querySelector('#feature-preview-prev').addEventListener('click', () => navigateFeaturePreview(featurePreviewIndex - 1));
      document.querySelector('#feature-preview-next').addEventListener('click', () => navigateFeaturePreview(featurePreviewIndex + 1));
      featurePreviewDots.forEach((dot, index) => dot.addEventListener('click', () => navigateFeaturePreview(index)));
      const startFeaturePreviewAutoplay = () => {
        window.clearInterval(featurePreviewTimer);
        if (featurePreviewIndex === 0) return;
        featurePreviewTimer = window.setInterval(() => showFeaturePreview(featurePreviewIndex + 1), 1000);
      };
      featurePreviewCarousel.addEventListener('mouseenter', () => window.clearInterval(featurePreviewTimer));
      featurePreviewCarousel.addEventListener('mouseleave', startFeaturePreviewAutoplay);
      featurePreviewVideo.addEventListener('ended', () => {
        showFeaturePreview(1);
        startFeaturePreviewAutoplay();
      });
      const startVideoFromUserGesture = () => {
        if (userStartedVideo) return;
        userStartedVideo = true;
        featurePreviewVideo.muted = false;
        featurePreviewSound.textContent = 'Sound on';
        featurePreviewSound.setAttribute('aria-label', 'Mute video sound');
        showFeaturePreview(0);
      };
      featurePreviewSound.addEventListener('click', () => {
        if (!userStartedVideo) startVideoFromUserGesture();
      });
      document.addEventListener('pointerdown', startVideoFromUserGesture, { once: true, capture: true });
      document.addEventListener('keydown', startVideoFromUserGesture, { once: true, capture: true });
      const warmAllSkins = () => skinCards.forEach(warmSkinModal);
      if ('requestIdleCallback' in window) {
        window.requestIdleCallback(warmAllSkins, { timeout: 2000 });
      } else {
        window.setTimeout(warmAllSkins, 1200);
      }

      const discordDialog = document.querySelector('#discord-dialog');
      const discordContent = document.querySelector('#discord-content');
      let discordLoaded = false;

      const renderDiscord = (guild) => {
        const visibleMembers = guild.members.slice(0, 6);
        const hiddenMembers = Math.max(guild.members.length - visibleMembers.length, 0);
        const banner = document.createElement('section');
        banner.className = 'relative min-h-[300px] overflow-hidden rounded-[24px] bg-gradient-to-br from-[#ff4757] to-[#8a1f30] p-7';
        banner.innerHTML = `<div class="relative z-10 flex h-full max-w-[23rem] flex-col justify-between gap-10"><div><span class="inline-flex rounded-full bg-white px-4 py-1.5 text-sm font-semibold text-[#d9364a]">${guild.name} community</span><h2 class="mt-5 text-5xl font-bold tracking-[-0.06em] text-white">Join the squad.</h2><p class="mt-3 max-w-[19rem] text-sm leading-relaxed text-white/90"><span class="font-bold text-white">${guild.presence_count}</span> players are online. Drop into voice rooms, get updates, and play DEADSHOT.io with KO.</p></div><a href="${guild.instant_invite}" target="_blank" rel="noreferrer" class="inline-flex w-max rounded-xl bg-white px-4 py-2 text-sm font-semibold text-black transition-transform hover:scale-105">Join now</a></div><img src="https://cdn.simpleicons.org/discord/ffffff" alt="" class="pointer-events-none absolute -right-8 bottom-0 h-[112%] w-auto opacity-20" />`;

        const channels = document.createElement('div');
        channels.className = 'mt-5';
        channels.innerHTML = '<p class="mb-3 text-lg font-semibold text-white">Voice rooms</p>';
        const channelList = document.createElement('div');
        channelList.className = 'flex flex-wrap gap-2.5';
        guild.channels.sort((a, b) => a.position - b.position).forEach((channel) => {
          const link = document.createElement('a');
          link.href = `https://discord.com/channels/${guild.id}/${channel.id}`;
          link.target = '_blank';
          link.rel = 'noreferrer';
          link.className = 'rounded-full bg-white/10 px-4 py-2 text-sm font-medium text-white/80 transition-colors hover:bg-white/20 hover:text-white';
          link.textContent = channel.name;
          channelList.append(link);
        });
        channels.append(channelList);

        const members = document.createElement('div');
        members.className = 'mt-5 flex items-center justify-between gap-5 rounded-2xl bg-white/10 p-2.5 pl-5';
        members.innerHTML = '<div><p class="text-sm font-medium text-white">In server now</p><p class="mt-0.5 text-xs text-white/50">Live Discord presence</p></div>';
        const memberStack = document.createElement('div');
        memberStack.className = 'flex -space-x-2 pr-1';
        visibleMembers.forEach((member) => {
          const avatar = document.createElement('img');
          avatar.src = member.avatar_url;
          avatar.alt = member.username;
          avatar.className = 'size-10 rounded-full object-cover shadow-[0_0_0_3px_rgba(36,16,20,1)]';
          memberStack.append(avatar);
        });
        if (hiddenMembers > 0) {
          const more = document.createElement('span');
          more.className = 'grid size-10 place-items-center rounded-full bg-[#ff4757] text-xs font-bold text-white shadow-[0_0_0_3px_rgba(36,16,20,1)]';
          more.textContent = `+${hiddenMembers}`;
          memberStack.append(more);
        }
        members.append(memberStack);
        discordContent.replaceChildren(banner, channels, members);
      };

      const loadDiscord = async () => {
        try {
          const response = await fetch('https://discord.com/api/guilds/1517961081480413244/widget.json');
          if (!response.ok) throw new Error('Discord widget unavailable');
          renderDiscord(await response.json());
          discordLoaded = true;
        } catch {
          discordContent.innerHTML = '<section class="rounded-[24px] bg-gradient-to-br from-[#ff4757] to-[#8a1f30] p-7"><span class="inline-flex rounded-full bg-white px-4 py-1.5 text-sm font-semibold text-[#d9364a]">KO community</span><h2 class="mt-5 text-5xl font-bold tracking-[-0.06em] text-white">Join the squad.</h2><a href="https://discord.com/invite/97d7w5nX" target="_blank" rel="noreferrer" class="mt-10 inline-flex rounded-xl bg-white px-4 py-2 text-sm font-semibold text-black">Join now</a></section>';
        }
      };

      document.querySelector('#open-discord').addEventListener('click', () => {
        pauseFeaturePreview();
        discordDialog.showModal();
        if (!discordLoaded) loadDiscord();
      });
      document.querySelector('#close-discord').addEventListener('click', () => discordDialog.close());
    </script>
  </body>
</html>
