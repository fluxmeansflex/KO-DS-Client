name: Build

on:
  push:
    tags: ['*']

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore .\ko-client.csproj -r win-x64

      - name: Build
        run: dotnet build .\ko-client.csproj -c Release --no-restore -p:DebugType=None -p:DebugSymbols=false

      - name: Publish
        run: >-
          dotnet publish .\ko-client.csproj -c Release -r win-x64 --self-contained false --no-restore
          -p:DebugType=None
          -p:DebugSymbols=false
          -o .\publish

      - name: Trim publish output
        shell: pwsh
        run: Remove-Item .\publish\*.xml -Force -ErrorAction SilentlyContinue

      - name: Build installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: installer.iss

      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: installer
          path: dist/*.exe
          if-no-files-found: error
          compression-level: 0

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Download installer
        uses: actions/download-artifact@v8
        with:
          name: installer
          path: dist

      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          artifacts: dist/*.exe
          generateReleaseNotes: true
          immutableCreate: true
          name: ${{ github.ref_name }}
          tag: ${{ github.ref_name }}
